name: BudgetWise CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────── FRONTEND ───────────────
  frontend:
    name: Frontend · Install & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: yarn install --network-timeout 600000

      - name: Build (production)
        env:
          REACT_APP_BACKEND_URL: http://localhost:8001
          CI: "false" # CRA treats warnings as errors when CI=true
        run: yarn build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
          retention-days: 7

  # ─────────────── BACKEND ───────────────
  backend:
    name: Backend · Install & Smoke-Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install WeasyPrint system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libcairo2 libgdk-pixbuf-2.0-0 \
            libffi-dev shared-mime-info fonts-liberation fonts-dejavu

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (non-blocking)
        continue-on-error: true
        run: |
          python -m flake8 server.py --max-line-length=160 --extend-ignore=E501,W503,E402,F401,F841

      - name: Smoke-test FastAPI app boots
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: budgetwise_ci
          JWT_SECRET: ci_test_jwt_secret_do_not_use_in_prod
          CORS_ORIGINS: "*"
          ENVIRONMENT: development
        run: |
          python -c "import server; print('OK: FastAPI app imports cleanly')"
          python -c "from server import app, db, api_router; print(f'Routes registered: {len(api_router.routes)}')"

      - name: Note about integration tests
        run: |
          echo "Integration tests in backend/tests/ require a live API server."
          echo "They are executed by the testing-agent harness, not in CI."

  # ─────────────── DOCKER BUILD VALIDATION ───────────────
  docker:
    name: Docker · Build validation
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: budgetwise-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: budgetwise-frontend:ci
          build-args: |
            REACT_APP_BACKEND_URL=http://localhost:8001
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # ─────────────── REPORT ───────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [frontend, backend, docker]
    steps:
      - name: Aggregate results
        run: |
          echo "## BudgetWise CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage    | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | ${{ needs.backend.result }} |"  >> $GITHUB_STEP_SUMMARY
          echo "| Docker   | ${{ needs.docker.result }} |"   >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.frontend.result }}" != "success" || "${{ needs.backend.result }}" != "success" || "${{ needs.docker.result }}" != "success" ]]; then
            echo "Pipeline failed" && exit 1
          fi
          echo "All stages passed"
